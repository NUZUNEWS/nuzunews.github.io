name: Build Android App Bundle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'tools platform-tools build-tools;34.0.0 build-tools;33.0.2 platforms;android-34 platforms;android-33'

    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Pre-configure Bubblewrap (skip JDK/SDK prompts)
      run: |
        mkdir -p ~/.bubblewrap
        printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
        cat ~/.bubblewrap/config.json

    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > android.keystore
        ls -lh android.keystore

    - name: Verify icon files exist
      run: |
        echo "Icon files in repo:"
        ls -la icon*.png

    - name: Start local HTTP server for icon downloads
      run: |
        # Start a Python HTTP server serving the repo files on localhost
        # This ensures Bubblewrap can download the icon reliably
        python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/http_server.log 2>&1 &
        echo "HTTP_SERVER_PID=$!" >> $GITHUB_ENV
        # Wait for server to start
        sleep 3
        # Verify the icon is accessible
        echo "Testing local icon URL:"
        curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:8000/icon512.png

    - name: Update twa-manifest.json to use local icon URLs
      run: |
        # Replace external icon URL with localhost URL (served by our HTTP server)
        sed -i 's|https://nuzunews.github.io/icon512.png|http://localhost:8000/icon512.png|g' twa-manifest.json
        echo "Updated twa-manifest.json icon URLs:"
        grep -i "icon" twa-manifest.json

    - name: Regenerate Android project from twa-manifest.json
      run: |
        # Provide "2.1" as the new versionName (must be non-empty)
        printf '2.1\n' | bubblewrap update

    - name: Build AAB
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        # Project already regenerated with checksum; only passwords needed
        printf "%s\n%s\n" "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" | bubblewrap build --skipPwaValidation

    - name: Stop HTTP server
      if: always()
      run: |
        if [ ! -z "$HTTP_SERVER_PID" ]; then
          kill $HTTP_SERVER_PID 2>/dev/null || true
        fi

    - name: Find AAB files
      if: always()
      run: |
        echo "Searching for AAB files..."
        find . -name "*.aab" -type f 2>/dev/null || echo "No AAB files found"
        echo ""
        echo "Searching for APK files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

    - name: Upload AAB artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: app-bundle
        path: |
          **/*.aab
          **/*.apk
        retention-days: 30
        if-no-files-found: warn
