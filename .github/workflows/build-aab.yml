name: Build Android App Bundle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'tools platform-tools build-tools;34.0.0 build-tools;33.0.2 platforms;android-34 platforms;android-33'

    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Pre-configure Bubblewrap (skip all prompts)
      run: |
        mkdir -p ~/.bubblewrap
        printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
        echo "Bubblewrap config:"
        cat ~/.bubblewrap/config.json
        echo ""
        echo "JAVA_HOME: $JAVA_HOME"
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo ""
        echo "Android SDK contents:"
        ls -la $ANDROID_HOME || echo "ANDROID_HOME not found"

    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > android.keystore
        ls -lh android.keystore

    - name: Build AAB
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        printf "%s\n%s\n" "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" | bubblewrap build --skipPwaValidation

    - name: Find AAB files
      if: always()
      run: find . -name "*.aab" -type f || echo "No AAB files found"

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-bundle
        path: "**/*.aab"
        retention-days: 30
