name: Build Android App Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap (skip JDK/SDK prompts)
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Decode keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android.keystore
          ls -lh android.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Verify icon files exist
        run: |
          echo "Icon files in repo:"
          ls -la icon*.png

      - name: Start local HTTP server for icon downloads
        run: |
          # -------------------------------------------------------
          # FIX 1: Bind to 0.0.0.0 (not 127.0.0.1) so the server
          # is reachable via BOTH IPv4 (127.0.0.1) and IPv6 (::1).
          # Bubblewrap resolves "localhost" as ::1 on Ubuntu runners.
          # -------------------------------------------------------
          # FIX 2: Copy icon-512.png → icon512.png so the URL in
          # twa-manifest.json (icon512.png, no dash) actually exists.
          # -------------------------------------------------------
          cp icon-512.png icon512.png

          python3 -m http.server 8000 > /tmp/http_server.log 2>&1 &
          echo "HTTP_SERVER_PID=$!" >> $GITHUB_ENV

          # Wait for server to be ready
          sleep 3

          # Verify icon is accessible on both IPv4 and IPv6
          echo "Testing IPv4 (127.0.0.1):"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:8000/icon512.png
          echo "Testing IPv6 (::1):"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://[::1]:8000/icon512.png

      - name: Update twa-manifest.json to use local icon URLs
        run: |
          # Replace external URL with localhost so Bubblewrap can download it
          sed -i 's|https://nuzunews.github.io/icon512.png|http://localhost:8000/icon512.png|g' twa-manifest.json
          echo "Updated twa-manifest.json icon URLs:"
          grep -i "icon" twa-manifest.json

      - name: Regenerate Android project from twa-manifest.json
        run: |
          # Provide "2.1" as the new versionName (must be non-empty)
          printf '2.1\n' | bubblewrap update

      - name: Build Android App Bundle (AAB)
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath android.keystore \
            --signingKeyAlias "${{ secrets.KEY_ALIAS }}" \
            --signingKeyPassword "${{ secrets.KEY_PASSWORD }}" \
            --signingKeystorePassword "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Stop HTTP server
        if: always()
        run: |
          if [ ! -z "$HTTP_SERVER_PID" ]; then
            kill $HTTP_SERVER_PID 2>/dev/null || true
          fi

      - name: Find AAB files
        run: |
          echo "Searching for AAB files..."
          find . -name "*.aab" -type f 2>/dev/null || echo "No AAB files found"
          echo ""
          echo "Searching for APK files..."
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: |
            **/*.aab
            **/*.apk
          retention-days: 30
          if-no-files-found: warn
