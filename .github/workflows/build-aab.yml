name: Build Android App Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap (skip JDK/SDK prompts)
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Decode keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android.keystore
          if [ ! -s android.keystore ]; then
            echo "##[error]android.keystore is 0 bytes — ANDROID_KEYSTORE_BASE64 secret is missing or empty!"
            exit 1
          fi
          echo "Keystore OK: $(ls -lh android.keystore)"
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Verify icon files exist
        run: |
          echo "Icon files in repo:"
          ls -la icon*.png

      - name: Start local HTTP server for icon downloads
        run: |
          cp icon-512.png icon512.png

          python3 -c "
          import http.server, socket
          class DualStackServer(http.server.ThreadingHTTPServer):
              address_family = socket.AF_INET6
              def server_bind(self):
                  self.socket.setsockopt(socket.IPPROTO_IPV6, socket.IPV6_V6ONLY, 0)
                  super().server_bind()
          print('Starting dual-stack server on port 8000...', flush=True)
          DualStackServer(('::', 8000), http.server.SimpleHTTPRequestHandler).serve_forever()
          " > /tmp/http_server.log 2>&1 &

          echo "HTTP_SERVER_PID=$!" >> $GITHUB_ENV
          sleep 3

          echo "Testing IPv4 (127.0.0.1):"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:8000/icon512.png || true
          echo "Testing IPv6 ([::1]):"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://[::1]:8000/icon512.png || true

      - name: Update twa-manifest.json to use local icon URLs
        run: |
          sed -i 's|https://nuzunews.github.io/icon512.png|http://localhost:8000/icon512.png|g' twa-manifest.json
          echo "Updated icon URLs:"
          grep -i "icon" twa-manifest.json

      - name: Fix missing/invalid fields in twa-manifest.json
        run: |
          python3 << 'PYEOF'
          import json
          with open('twa-manifest.json') as f:
              m = json.load(f)

          # Fix 1: splashScreenFadeOutDuration being null generates invalid build.gradle syntax
          if not m.get('splashScreenFadeOutDuration'):
              m['splashScreenFadeOutDuration'] = 300
              print('Set splashScreenFadeOutDuration to 300')

          # Fix 2: androidbrowserhelper 2.6.2 requires minSdkVersion >= 21
          if m.get('minSdkVersion', 0) < 21:
              print('Bumping minSdkVersion from', m.get('minSdkVersion'), 'to 21')
              m['minSdkVersion'] = 21

          with open('twa-manifest.json', 'w') as f:
              json.dump(m, f, indent=2)

          print('twa-manifest.json updated successfully')
          PYEOF

      - name: Regenerate Android project from twa-manifest.json
        run: |
          printf '2.1\n' | bubblewrap update

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Build Android App Bundle (AAB)
        run: |
          expect << EXPECT_SCRIPT
            set timeout 300
            spawn bubblewrap build --skipPwaValidation
            expect "Password for the Key Store:"
            send "$env(KEYSTORE_PASS)\r"
            expect "Password for the Key:"
            send "$env(KEY_PASS)\r"
            expect eof
            catch wait result
            exit [lindex \$result 3]
          EXPECT_SCRIPT
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}

      - name: Stop HTTP server
        if: always()
        run: |
          if [ ! -z "$HTTP_SERVER_PID" ]; then
            kill $HTTP_SERVER_PID 2>/dev/null || true
          fi

      - name: Find AAB files
        run: |
          echo "Searching for AAB files..."
          find . -name "*.aab" -type f 2>/dev/null || echo "No AAB files found"
          echo "Searching for APK files..."
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: |
            **/*.aab
            **/*.apk
          retention-days: 30
          if-no-files-found: warn
