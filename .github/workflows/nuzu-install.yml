name: NUZU Production Install

# Runs automatically when you push nuzu-bundle.js to main.
# Also available as a manual trigger from the Actions tab.
#
# What it does:
#   1. Runs bot_patch.py which patches bot.py (adds bundle script tag + XSS fixes)
#   2. Commits the result back to the repo
#
# Safe to re-run - already-applied patches are detected and skipped.
# To undo - revert the "Apply NUZU production hardening" commit.

on:
  push:
    branches: [main]
    paths:
      - nuzu-bundle.js
  workflow_dispatch:

jobs:
  install:
    name: Patch bot.py
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run patcher
        run: python3 bot_patch.py

      - name: Commit result
        run: |
          git config user.name "NUZU Install Bot"
          git config user.email "actions@github.com"
          git add bot.py
          if git diff --cached --quiet; then
            echo "Nothing to commit - already patched."
          else
            git commit -m "Apply NUZU production hardening to bot.py"
            git push
          fi

      - name: Write job summary
        run: |
          echo "## NUZU Production Install" >> $GITHUB_STEP_SUMMARY
          echo "Patch complete. bot.py has been updated." >> $GITHUB_STEP_SUMMARY
          echo "The next scheduled bot run will generate a hardened index.html." >> $GITHUB_STEP_SUMMARY
