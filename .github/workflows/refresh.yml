name: refresh

on:
  schedule:
    - cron: '0 * * * *'     # hourly
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run main bot (builds index.html)
        run: python bot.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Core outputs
          git add index.html feed.xml feed.json _headers || true
          # Persisted state
          git add yesterday_top.json feed_health.json 2>/dev/null || true
          # Self-hosted publisher favicons (safe if dir is empty)
          git add icons/sources/ 2>/dev/null || true
          git commit -m "Auto-refresh $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push
