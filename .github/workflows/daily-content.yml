name: NUZU Daily Content Update

on:
  schedule:
    - cron: '5 0 * * *'   # 12:05 AM UTC — after midnight, horoscopes are fresh
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  update-daily-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet requests beautifulsoup4 feedparser

      - name: Generate horoscopes
        run: python generate_horoscopes.py
        continue-on-error: true   # Don't block if API is down

      - name: Generate comic RSS
        run: python generate_comic_rss.py
        continue-on-error: true   # Don't block if playlist missing

      - name: Run NUZU bot (main aggregator)
        run: python bot.py

      - name: Commit and push all updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Core outputs
          git add \
            horoscopes.json \
            comics.rss \
            index.html \
            feed.xml \
            feed.json \
            _headers \
            sw.js \
            manifest.json \
            2>/dev/null || true
          # Persisted state
          git add yesterday_top.json feed_health.json 2>/dev/null || true
          # Self-hosted publisher favicons
          git add icons/sources/ 2>/dev/null || true
          git commit -m "Daily update $(date -u '+%Y-%m-%d %H:%M UTC')" \
            || echo "Nothing to commit — site is up to date"
          git push
